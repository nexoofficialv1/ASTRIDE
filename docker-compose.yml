services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: localride
      POSTGRES_USER: localride
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - localride_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localride -d localride"]
      interval: 10s
      timeout: 5s
      retries: 10
  api:
    image: node:20-alpine
    working_dir: /app/services/api
    command: sh -c "npm install && npm run migrate && npm start"
    env_file: ./services/api/.env
    volumes:
      - ./:/app
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  localride_pgdata:
