name: Mobile Quality Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        app: [passenger_flutter, driver_flutter, partner_flutter]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Bootstrap native project
        run: bash mobile_build/scripts/bootstrap_mobile.sh "${{ matrix.app }}"
      - name: Analyze
        working-directory: apps/${{ matrix.app }}
        run: flutter analyze
      - name: Test
        working-directory: apps/${{ matrix.app }}
        run: flutter test
      - name: Validate localization
        run: node tests/locale-parity.mjs
      - name: Validate mobile pipeline
        run: node tests/mobile-v23-build-pipeline.mjs
