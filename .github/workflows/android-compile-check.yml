name: Android Compile Check
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [passenger_flutter, driver_flutter, partner_flutter]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Bootstrap native project
        run: bash mobile_build/scripts/bootstrap_mobile.sh ${{ matrix.app }}
      - name: Analyze
        working-directory: apps/${{ matrix.app }}
        run: flutter analyze
      - name: Test
        working-directory: apps/${{ matrix.app }}
        run: flutter test
      - name: Compile debug APK
        working-directory: apps/${{ matrix.app }}
        run: flutter build apk --debug --dart-define-from-file=../../mobile_build/environments/staging.json
      - uses: actions/upload-artifact@v4
        with:
          name: astride-${{ matrix.app }}-compile-check
          path: apps/${{ matrix.app }}/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7
