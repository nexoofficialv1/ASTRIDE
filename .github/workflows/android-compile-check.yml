name: Android Compile Check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        app: [passenger_flutter, driver_flutter, partner_flutter]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate maintained source
        run: python3 mobile_build/scripts/validate_mobile_source.py
      - name: Bootstrap native project
        run: bash mobile_build/scripts/bootstrap_mobile.sh "${{ matrix.app }}"
      - name: Inject Passenger/Driver Firebase configuration
        if: matrix.app != 'partner_flutter'
        env:
          FIREBASE_ANDROID_CONFIG_BASE64: ${{ matrix.app == 'passenger_flutter' && secrets.PASSENGER_FIREBASE_ANDROID_BASE64 || secrets.DRIVER_FIREBASE_ANDROID_BASE64 }}
          FIREBASE_REQUIRED: 'true'
        run: bash mobile_build/scripts/inject_firebase.sh "${{ matrix.app }}"
      - name: Verify Firebase build input
        if: matrix.app != 'partner_flutter'
        run: test -s "apps/${{ matrix.app }}/android/app/google-services.json"
      - name: Analyze
        working-directory: apps/${{ matrix.app }}
        run: flutter analyze --no-fatal-infos
      - name: Test
        working-directory: apps/${{ matrix.app }}
        run: flutter test
      - name: Validate mobile pipeline
        run: node tests/mobile-v23-build-pipeline.mjs
      - name: Compile debug APK
        working-directory: apps/${{ matrix.app }}
        run: flutter build apk --debug --build-name=3.20.0 --build-number=346 --dart-define-from-file=../../mobile_build/environments/staging.json
      - uses: actions/upload-artifact@v4
        with:
          name: astride-${{ matrix.app }}-compile-check-b346
          path: apps/${{ matrix.app }}/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7
