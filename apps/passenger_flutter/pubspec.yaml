name: astride_passenger
description: ASTRIDE production passenger mobile application
publish_to: none
version: 3.14.0+318
environment:
  sdk: ">=3.4.0 <4.0.0"
dependencies:
  share_plus: ^10.1.2
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.0.5
  web_socket_channel: ^3.0.1
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0
  permission_handler: ^11.3.1
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3
flutter:
  uses-material-design: true
  assets:
    - assets/locales/
    - assets/brand/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/app_icon.png
  adaptive_icon_background: "#0D1B3D"
  adaptive_icon_foreground: assets/brand/app_icon.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0D1B3D"
  image: assets/brand/splash_logo.png
  android_12:
    color: "#0D1B3D"
    image: assets/brand/app_icon.png
  ios: true
  android: true
